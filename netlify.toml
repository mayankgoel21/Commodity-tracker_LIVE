[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Commodity prices — 1st and 15th of every month
[[scheduled_functions]]
  function = "fetch-prices"
  cron = "0 6 1,15 * *"

# FX rates — 1st and 15th of every month
[[scheduled_functions]]
  function = "fetch-fx"
  cron = "0 6 1,15 * *"
